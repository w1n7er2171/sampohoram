<!-- TRIPS GRID -->
<section id="trips" class="trips"></section>

<!-- MODAL -->
<div id="modal" class="modal">

    <h1 id="m-title"></h1>

    <img id="m-image" class="modal-image" />

    <p id="m-desc"></p>

    <div id="m-stats" class="modal-stats"></div>

    <img id="m-route" class="modal-route" />

    <h3>Джерела</h3>
    <ul id="m-sources" class="modal-sources"></ul>

  </div>
</div>

<footer class="footer">
  © Сам По Горам — походи, історії та забуті місця
</footer>

<script src="js/app.js"></script>
